<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>SMC Bot (Finnhub)</title>
</head>
<body style="background:#0d1117;color:white;font-family:monospace">

<h2>SMC/ICT Bot (Finnhub)</h2>

<input id="apiKey" placeholder="Встав API ключ Finnhub" style="width:300px;padding:8px">
<button onclick="runAnalysis()">АНАЛІЗ</button>

<pre id="output"></pre>

<script>
// ── FINNHUB ─────────────────────────────

async function fetchFinnhubCandles(symbol, resolution, from, to, key){
  const map = {
    "XAU": "OANDA:XAU_USD",
    "EUR": "OANDA:EUR_USD"
  };

  const url = `https://finnhub.io/api/v1/forex/candle?symbol=${map[symbol]}&resolution=${resolution}&from=${from}&to=${to}&token=${key}`;

  const res = await fetch(url);
  const data = await res.json();

  if(data.s !== "ok") throw new Error("Finnhub error");

  return data.t.map((t,i)=>({
    t: new Date(t*1000).toISOString(),
    o: data.o[i],
    h: data.h[i],
    l: data.l[i],
    c: data.c[i]
  })).reverse();
}

// 4H з 1H
function build4H(candles1h){
  const result = [];

  for(let i = 0; i < candles1h.length; i += 4){
    const chunk = candles1h.slice(i, i+4);
    if(chunk.length < 4) continue;

    result.push({
      t: chunk[0].t,
      o: chunk[0].o,
      h: Math.max(...chunk.map(c=>c.h)),
      l: Math.min(...chunk.map(c=>c.l)),
      c: chunk[chunk.length-1].c
    });
  }

  return result;
}

// аналіз (спрощений)
function analyze(c1h, c4h){
  const last = c1h[0];
  const prev = c1h[1];

  if(last.c > prev.c){
    return "BUY";
  } else {
    return "SELL";
  }
}

// ── MAIN ─────────────────────────────

async function runAnalysis(){
  const key = document.getElementById('apiKey').value.trim();
  const out = document.getElementById('output');

  if(!key){
    out.textContent = "Введи API ключ";
    return;
  }

  const now = Math.floor(Date.now()/1000);
  const from = now - 60*60*24*5;

  try{
    out.textContent = "Завантаження...";

    const [
      x1h,
      e1h
    ] = await Promise.all([
      fetchFinnhubCandles('XAU',"60",from,now,key),
      fetchFinnhubCandles('EUR',"60",from,now,key)
    ]);

    const x4h = build4H(x1h);
    const e4h = build4H(e1h);

    const xSignal = analyze(x1h, x4h);
    const eSignal = analyze(e1h, e4h);

    out.textContent =
      "XAUUSD: " + xSignal + "\n" +
      "EURUSD: " + eSignal;

  }catch(e){
    out.textContent = "Помилка: " + e.message;
  }
}
</script>

</body>
</html>
